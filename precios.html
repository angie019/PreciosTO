            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .card-base:hover {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        /* Botones marca */
        .brand-btn {
            border-radius: 18px;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .brand-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .brand-btn:hover::before {
            opacity: 1;
        }

        .brand-btn:active {
            transform: scale(0.98);
        }

        /* Animaciones suaves */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .animate-slideUp {
            animation: slideUp 0.3s ease;
        }

        .animate-fadeIn {
            animation: fadeIn 0.3s ease;
        }

        /* Borde decorativo con puntos */
        .border-dots {
            border: 2px dashed rgba(255, 255, 255, 0.4);
        }

        /* Líneas decorativas */
        .line-decoration {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);

        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        .product-item {
            transition: background-color 0.2s ease;
            border-radius: 12px;
        }

        .product-item:hover {
            background: rgba(0, 0, 0, 0.02);

        function App() {
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [productos, setProductos] = useState(() => {
                const saved = localStorage.getItem('tecno_productos');
                return saved ? JSON.parse(saved) : DATOS_INICIALES;
            });
            const [expandedBrand, setExpandedBrand] = useState(null);
            const [editingProduct, setEditingProduct] = useState(null);
            const [newProduct, setNewProduct] = useState({ marca: 'APPLE', nombre: '', precio: '', novedad: '', pauta: false });

            const ADMIN_PASSWORD = 'tecno2024';

            useEffect(() => {
                localStorage.setItem('tecno_productos', JSON.stringify(productos));
            }, [productos]);

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) {
                    setIsAdmin(true);
                    setPasswordInput('');
                } else {
                    alert('Contraseña incorrecta');
                }
            };

            const handleAdminLogout = () => {
                setIsAdmin(false);
            };

            const handleAddProduct = (marca) => {
                if (!newProduct.nombre || !newProduct.precio) return;

                const id = `${marca.toLowerCase()}_${Date.now()}`;
                const updatedProducts = {
                    ...productos,
                    [marca]: [...(productos[marca] || []), {
                        id,
                        nombre: newProduct.nombre,
                        precio: parseFloat(newProduct.precio),
                        novedad: newProduct.novedad,
                        pauta: newProduct.pauta
                    }]
                };
                setProductos(updatedProducts);
                setNewProduct({ marca: 'APPLE', nombre: '', precio: '', novedad: '', pauta: false });
            };

            const handleDeleteProduct = (marca, productId) => {
                setProductos({
                    ...productos,
                    [marca]: productos[marca].filter(p => p.id !== productId)
                });
            };

            const handleUpdateProduct = (marca, productId, updates) => {
                setProductos({
                    ...productos,
                    [marca]: productos[marca].map(p =>
                        p.id === productId ? { ...p, ...updates } : p
                    )
                });
                setEditingProduct(null);
            };

            const handleTogglePauta = (marca, productId) => {
                setProductos({
                    ...productos,
                    [marca]: productos[marca].map(p =>
                        p.id === productId ? { ...p, pauta: !p.pauta } : p
                    )
                });
            };

            const productosPauta = useMemo(() => {
                const result = [];
                Object.entries(productos).forEach(([marca, prods]) => {
                    prods.forEach(p => {
                        if (p.pauta) result.push({ ...p, marca });
                    });
                });
                return result;
            }, [productos]);

            return (
                <>
                    <div className="watermark"></div>
                    <div className="content">
                        {!isAdmin ? (
                            <VistaEmpleados
                                productos={productos}
                                COLORES_PASTEL={COLORES_PASTEL}
                                expandedBrand={expandedBrand}
                                setExpandedBrand={setExpandedBrand}
                                productosPauta={productosPauta}
                                onAdminClick={() => setAdminPassword('')}
                            />
                        ) : (
                            <VistaAdmin
                                productos={productos}
                                COLORES_PASTEL={COLORES_PASTEL}
                                onLogout={handleAdminLogout}
                                onAddProduct={handleAddProduct}
                                onDeleteProduct={handleDeleteProduct}
                                onUpdateProduct={handleUpdateProduct}
                                onTogglePauta={handleTogglePauta}
                                newProduct={newProduct}
                                setNewProduct={setNewProduct}
                                editingProduct={editingProduct}
                                setEditingProduct={setEditingProduct}
                            />
                        )}

                        {!isAdmin && adminPassword === '' && (
                            <ModalAdmin
                                onClose={() => setAdminPassword('closed')}
                                onLogin={handleAdminLogin}
                                passwordInput={passwordInput}
                                setPasswordInput={setPasswordInput}
                            />
                        )}
                    </div>
                </>
            );
        }

        function VistaEmpleados({ productos, COLORES_PASTEL, expandedBrand, setExpandedBrand, productosPauta }) {
            return (
                <div className="min-h-screen pb-24">
                    {/* Header suave */}
                    <div className="sticky top-0 z-40 header-soft">
                        <div className="max-w-5xl mx-auto px-4 py-4">
                            <div className="flex items-center gap-3">
                                <img src="logo-tecno.png" alt="Tecno Outlet" className="h-20 flex-shrink-0" />
                                <div>
                                    <h1 className="text-2xl font-black text-gray-800">Tecno Outlet</h1>
                                    <p className="text-gray-500 text-xs mt-0.5">Precios actualizados diariamente</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-5xl mx-auto px-4 py-8">
                        {/* Sección de Especiales - Siempre Visible */}
                        <div className="mb-12 animate-fadeIn">
                            <div className="card-base rounded-lg-soft shadow-soft-md overflow-hidden">
                                {/* Header del cuadro */}
                                <div className="bg-gradient-to-r from-yellow-300 to-orange-300 p-6">
                                    <h2 className="text-2xl font-black text-gray-800">✨ Especiales</h2>
                                    <p className="text-gray-700 text-sm mt-1">Productos en oferta</p>
                                </div>

                                {/* Tabla de productos */}
                                <div className="divide-y divide-gray-200">
                                    {productosPauta.length > 0 ? (
                                        productosPauta.map((product, idx) => (
                                            <div key={product.id} className="p-5 hover:bg-gray-50 transition">
                                                <div className="flex justify-between items-start gap-4">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 mb-2">
                                                            <span
                                                                className="text-xs font-bold px-2.5 py-1 rounded-full text-white"
                                                                style={{ backgroundColor: COLORES_PASTEL[product.marca]?.color }}
                                                            >
                                                                {product.marca}
                                                            </span>
                                                        </div>
                                                        <p className="font-bold text-gray-800 text-base">{product.nombre}</p>
                                                        {product.novedad && (
                                                            <p className="text-xs text-gray-600 mt-2">📝 {product.novedad}</p>
                                                        )}
                                                    </div>
                                                    <div className="text-right flex-shrink-0">
                                                        <p className="text-2xl font-black" style={{ color: COLORES_PASTEL[product.marca]?.color }}>
                                                            ${product.precio.toLocaleString()}
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="p-6 text-center">
                                            <p className="text-gray-500 text-sm">Sin productos en oferta</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Catálogo por Marca */}
                        <div className="animate-fadeIn">
                            <h2 className="text-2xl font-black text-gray-800 mb-6">Catálogo por Marca</h2>

                            <div className="grid gap-4">
                                {Object.entries(COLORES_PASTEL).map(([marcaName, config]) => (
                                    <div key={marcaName}>
                                        <button
                                            onClick={() => setExpandedBrand(expandedBrand === marcaName ? null : marcaName)}
                                            className="brand-btn w-full p-5 rounded-lg-soft font-bold text-white transition shadow-soft-md"
                                            style={{
                                                backgroundColor: config.color,
                                                color: '#1f2937'
                                            }}
                                        >
                                            <div className="flex justify-between items-center">
                                                <span className="text-lg">{config.icon} {marcaName}</span>
                                                <span className="text-xl">{expandedBrand === marcaName ? '▼' : '▶'}</span>
                                            </div>
                                            <p className="text-xs font-normal mt-2 opacity-75">
                                                {(productos[marcaName] || []).length} productos
                                            </p>
                                        </button>

                                        {expandedBrand === marcaName && (
                                            <div className="mt-3 card-base rounded-lg-soft shadow-soft-md overflow-hidden animate-slideUp">
                                                {(productos[marcaName] || []).map((product) => (
                                                    <div
                                                        key={product.id}
                                                        className="product-item border-b last:border-b-0 p-4 mx-4 my-3"
                                                        style={{
                                                            backgroundColor: product.pauta ? `${config.colorLight}` : 'transparent'
                                                        }}
                                                    >
                                                        <div className="flex justify-between items-start gap-3">
                                                            <div className="flex-1">
                                                                <p className="font-semibold text-gray-800">{product.nombre}</p>
                                                                {product.novedad && (
                                                                    <p className="text-xs text-gray-500 mt-2">📝 {product.novedad}</p>
                                                                )}
                                                                {product.pauta && (
                                                                    <div className="badge-pauta mt-3">🎯 PAUTA</div>
                                                                )}
                                                            </div>
                                                            <div className="text-right flex-shrink-0">
                                                                <p className="text-xl font-black" style={{ color: config.color }}>
                                                                    ${product.precio.toLocaleString()}
                                                                </p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Marca de agua */}
                    <div className="watermark-expanded"></div>

                    {/* Botón de tuerca para acceso admin */}
                    <button
                        onClick={() => window.scrollTo(0, 0)}
                        className="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-br from-orange-400 to-orange-500 hover:from-orange-500 hover:to-orange-600 rounded-full shadow-lg flex items-center justify-center text-2xl transition z-50 cursor-pointer"
                        title="Panel de Control"
                    >
                        ⚙️
                    </button>
                </div>
            );
        }

        function VistaAdmin({ productos, COLORES_PASTEL, onLogout, onAddProduct, onDeleteProduct, onUpdateProduct, onTogglePauta, newProduct, setNewProduct, editingProduct, setEditingProduct }) {
            const [selectedBrand, setSelectedBrand] = useState('APPLE');
            const [creatingBrand, setCreatingBrand] = useState(false);
            const [newBrandName, setNewBrandName] = useState('');
            const [colorStore, setColorStore] = useState(COLORES_PASTEL);

            return (
                <div className="min-h-screen pb-24">
                    {/* Header Admin */}
                    <div className="sticky top-0 z-40 bg-gradient-to-r from-orange-100 to-red-100 border-b border-orange-200 backdrop-filter backdrop-blur-md">
                        <div className="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src="logo-tecno.png" alt="Tecno Outlet" className="h-20 flex-shrink-0" />
                                <div>
                                    <h1 className="text-2xl font-black text-gray-800">🔧 Panel Admin</h1>
                                    <p className="text-gray-600 text-xs mt-0.5">Gestión de precios</p>
                                </div>
                            </div>
                            <button
                                onClick={onLogout}
                                className="bg-white text-orange-600 px-5 py-2.5 rounded-lg-soft font-bold hover:bg-orange-50 transition shadow-soft flex-shrink-0"
                            >
                                Salir
                            </button>
                        </div>
                    </div>

                    <div className="max-w-5xl mx-auto px-4 py-8">
                        {/* Formulario */}
                        <div className="card-base rounded-lg-soft shadow-soft-md p-7 mb-10 border-t-4 border-orange-400 animate-fadeIn">
                            <h2 className="text-xl font-black mb-6 text-gray-800">Agregar Nuevo Producto</h2>

                            <div className="grid gap-4 mb-6">
                                <div className="flex gap-2">
                                    <select
                                        value={newProduct.marca}
                                        onChange={(e) => setNewProduct({ ...newProduct, marca: e.target.value })}
                                        className="flex-1 p-3.5 border-2 border-gray-200 rounded-lg-soft font-semibold text-gray-700 focus:outline-none focus:border-orange-300"
                                    >
                                        {Object.keys(colorStore).map(marca => (
                                            <option key={marca} value={marca}>{marca}</option>
                                        ))}
                                    </select>
                                    <button
                                        onClick={() => setCreatingBrand(true)}
                                        className="px-4 py-3.5 bg-blue-300 hover:bg-blue-400 text-gray-800 rounded-lg-soft font-bold transition shadow-soft flex-shrink-0"
                                        title="Crear nueva marca"
                                    >
                                        ➕ Marca
                                    </button>
                                </div>

                                <input
                                    type="text"
                                    placeholder="Nombre del producto"
                                    value={newProduct.nombre}
                                    onChange={(e) => setNewProduct({ ...newProduct, nombre: e.target.value })}
                                    className="p-3.5 border-2 border-gray-200 rounded-lg-soft focus:outline-none focus:border-orange-300"
                                />

                                <input
                                    type="number"
                                    placeholder="Precio"
                                    value={newProduct.precio}
                                    onChange={(e) => setNewProduct({ ...newProduct, precio: e.target.value })}
                                    className="p-3.5 border-2 border-gray-200 rounded-lg-soft focus:outline-none focus:border-orange-300"
                                />

                                <input
                                    type="text"
                                    placeholder="Observaciones (usado, sin caja, etc)"
                                    value={newProduct.novedad}
                                    onChange={(e) => setNewProduct({ ...newProduct, novedad: e.target.value })}
                                    className="p-3.5 border-2 border-gray-200 rounded-lg-soft focus:outline-none focus:border-orange-300"
                                />

                                <label className="flex items-center p-4 border-2 border-gray-200 rounded-lg-soft cursor-pointer hover:bg-gray-50 transition">
                                    <input
                                        type="checkbox"
                                        checked={newProduct.pauta}
                                        onChange={(e) => setNewProduct({ ...newProduct, pauta: e.target.checked })}
                                        className="w-5 h-5 mr-3 accent-orange-400"
                                    />
                                    <span className="font-semibold text-gray-800">Marcar como PAUTA</span>
                                </label>
                            </div>

                            <button
                                onClick={() => onAddProduct(newProduct.marca)}
                                className="w-full bg-gradient-to-r from-green-400 to-emerald-500 hover:from-green-500 hover:to-emerald-600 text-white font-bold py-3 rounded-lg-soft transition shadow-soft-md"
                            >
                                ✅ Agregar Producto
                            </button>
                        </div>

                        {/* Selector de Marca */}
                        <div className="mb-8">
                            <h3 className="text-lg font-black mb-4 text-gray-800">Editar por Marca</h3>
                            <div className="grid grid-cols-3 gap-2 sm:gap-3">
                                {Object.entries(COLORES_PASTEL).map(([marca, config]) => (
                                    <button
                                        key={marca}
                                        onClick={() => setSelectedBrand(marca)}
                                        className={`p-3 rounded-lg-soft font-bold text-white transition shadow-soft text-sm ${
                                            selectedBrand === marca ? 'ring-3 ring-offset-2' : ''
                                        }`}
                                        style={{
                                            backgroundColor: config.color,
                                            ringColor: config.color,
                                            color: '#1f2937'
                                        }}
                                    >
                                        {marca}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Listado de Productos */}
                        <div className="card-base rounded-lg-soft shadow-soft-md overflow-hidden animate-fadeIn">
                            <div className="p-6" style={{ backgroundColor: COLORES_PASTEL[selectedBrand]?.colorLight }}>
                                <h3 className="text-lg font-black text-gray-800">{selectedBrand} ({(productos[selectedBrand] || []).length} productos)</h3>
                            </div>

                            <div className="divide-y divide-gray-200">
                                {(productos[selectedBrand] || []).map(product => (
                                    <div key={product.id} className="p-5 hover:bg-gray-50 transition">
                                        <div className="flex justify-between items-start gap-4 mb-3">
                                            <div className="flex-1">
                                                <p className="font-bold text-gray-800">{product.nombre}</p>
                                                {product.novedad && (
                                                    <p className="text-sm text-gray-600 mt-2">📝 {product.novedad}</p>
                                                )}
                                            </div>
                                            <div className="text-right flex-shrink-0">
                                                <p className="text-2xl font-black" style={{ color: COLORES_PASTEL[selectedBrand]?.color }}>
                                                    ${product.precio.toLocaleString()}
                                                </p>
                                                {product.pauta && (
                                                    <span className="inline-block mt-2 badge-pauta">PAUTA</span>
                                                )}
                                            </div>
                                        </div>

                                        <div className="flex gap-2">
                                            <button
                                                onClick={() => onTogglePauta(selectedBrand, product.id)}
                                                className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition shadow-soft ${
                                                    product.pauta
                                                        ? 'bg-yellow-300 hover:bg-yellow-400 text-gray-800'
                                                        : 'bg-gray-200 hover:bg-gray-300 text-gray-800'
                                                }`}
                                            >
                                                {product.pauta ? '✅ En Pauta' : '➕ Pauta'}
                                            </button>
                                            <button
                                                onClick={() => setEditingProduct(product)}
                                                className="px-4 py-2.5 bg-blue-300 hover:bg-blue-400 text-gray-800 rounded-lg text-sm font-bold transition shadow-soft"
                                            >
                                                ✏️ Editar
                                            </button>
                                            <button
                                                onClick={() => onDeleteProduct(selectedBrand, product.id)}
                                                className="px-4 py-2.5 bg-red-300 hover:bg-red-400 text-gray-800 rounded-lg text-sm font-bold transition shadow-soft"
                                            >
                                                🗑️ Borrar
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {creatingBrand && (
                        <ModalCrearMarca
                            onClose={() => setCreatingBrand(false)}
                            onSave={(brandName) => {
                                const marcaUpper = brandName.toUpperCase();
                                const colors = ['#a8d5ba', '#7b9fd9', '#e0a3c8', '#ffd966', '#c5a88b', '#9b8fb5'];
                                const randomColor = colors[Math.floor(Math.random() * colors.length)];

                                // Agregar marca con color automático
                                const newColorStore = { ...colorStore };
                                newColorStore[marcaUpper] = {
                                    color: randomColor,
                                    colorLight: randomColor + '20',
                                    colorDark: randomColor,
                                    icon: '📦'
                                };
                                setColorStore(newColorStore);

                                // Crear entrada vacía para la nueva marca en productos
                                setProductos({ ...productos, [marcaUpper]: [] });

                                // Cambiar a la nueva marca
                                setNewProduct({ ...newProduct, marca: marcaUpper });
                                setSelectedBrand(marcaUpper);
                                setCreatingBrand(false);
                                setNewBrandName('');
                            }}
                        />
                    )}

                    {editingProduct && (
                        <ModalEditar
                            product={editingProduct}
                            onClose={() => setEditingProduct(null)}
                            onSave={(updates) => onUpdateProduct(selectedBrand, editingProduct.id, updates)}
                        />
                    )}

                    {/* Marca de agua */}
                    <div className="watermark-expanded"></div>

                    {/* Botón de tuerca para cerrar sesión rápido */}
                    <button
                        onClick={onLogout}
                        className="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-br from-red-400 to-red-500 hover:from-red-500 hover:to-red-600 rounded-full shadow-lg flex items-center justify-center text-2xl transition z-50 cursor-pointer"
                        title="Cerrar Sesión"
                    >
                        🚪
                    </button>
                </div>
            );
        }

        function ModalAdmin({ onClose, onLogin, passwordInput, setPasswordInput }) {
            return (
                <div className="fixed inset-0 bg-black bg-opacity-30 backdrop-blur-sm flex items-end z-50">
                    <div className="bg-white w-full rounded-t-3xl p-6 animate-slideUp shadow-soft-md">
                        <h2 className="text-2xl font-black mb-5 text-gray-800">🔐 Acceso Admin</h2>
                        <form onSubmit={onLogin}>
                            <input
                                type="password"
                                placeholder="Contraseña"
                                value={passwordInput}
                                onChange={(e) => setPasswordInput(e.target.value)}
                                className="w-full p-4 border-2 border-gray-300 rounded-lg-soft mb-5 font-semibold focus:outline-none focus:border-orange-400"
                                autoFocus
                            />
                            <div className="flex gap-3">
                                <button
                                    type="submit"
                                    className="flex-1 bg-gradient-to-r from-green-400 to-emerald-500 hover:from-green-500 hover:to-emerald-600 text-white font-bold py-3 rounded-lg-soft transition shadow-soft-md"
                                >
                                    Entrar
                                </button>
                                <button
                                    type="button"
                                    onClick={onClose}
                                    className="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 rounded-lg-soft transition shadow-soft-md"
                                >
                                    Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function ModalEditar({ product, onClose, onSave, onAddBrand }) {
            const isCreatingBrand = product?.isCreatingBrand;
            const [nombre, setNombre] = useState(product?.nombre || '');
            const [precio, setPrecio] = useState(product?.precio || '');
            const [novedad, setNovedad] = useState(product?.novedad || '');

            const handleSave = () => {
                if (isCreatingBrand) {
                    const brandName = nombre.trim().toUpperCase();
                    if (brandName) {
                        onAddBrand(brandName);
                    }
                } else {
                    onSave({
                        nombre,
                        precio: parseFloat(precio),
                        novedad
                    });
                }
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-30 backdrop-blur-sm flex items-end z-50">
                    <div className="bg-white w-full rounded-t-3xl p-6 animate-slideUp shadow-soft-md">
                        <h2 className="text-2xl font-black mb-5 text-gray-800">
                            {isCreatingBrand ? '✨ Crear Nueva Marca' : '✏️ Editar Producto'}
                        </h2>

                        <div className="grid gap-4 mb-6">
                            <input
                                type="text"
                                value={nombre}
                                onChange={(e) => setNombre(isCreatingBrand ? e.target.value.toUpperCase() : e.target.value)}
                                className="p-3.5 border-2 border-gray-300 rounded-lg-soft focus:outline-none focus:border-orange-400"
                                placeholder={isCreatingBrand ? "Nombre de la marca (ej: PHILIPS)" : "Nombre"}
                                autoFocus
                            />
                            {!isCreatingBrand && (
                                <>
                                    <input
                                        type="number"
                                        value={precio}
                                        onChange={(e) => setPrecio(e.target.value)}
                                        className="p-3.5 border-2 border-gray-300 rounded-lg-soft focus:outline-none focus:border-orange-400"
                                        placeholder="Precio"
                                    />
                                    <input
                                        type="text"
                                        value={novedad}
                                        onChange={(e) => setNovedad(e.target.value)}
                                        className="p-3.5 border-2 border-gray-300 rounded-lg-soft focus:outline-none focus:border-orange-400"
                                        placeholder="Observaciones"
                                    />
                                </>
                            )}
                        </div>

                        <div className="flex gap-3">
                            <button
                                onClick={handleSave}
                                className="flex-1 bg-gradient-to-r from-green-400 to-emerald-500 hover:from-green-500 hover:to-emerald-600 text-white font-bold py-3 rounded-lg-soft transition shadow-soft-md"
                            >
                                ✅ {isCreatingBrand ? 'Crear Marca' : 'Guardar'}
                            </button>
                            <button
                                onClick={onClose}
                                className="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 rounded-lg-soft transition shadow-soft-md"
                            >
                                Cancelar
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function ModalCrearMarca({ onClose, onSave }) {
            const [marcaNombre, setMarcaNombre] = useState('');

            const handleSave = () => {
                if (!marcaNombre.trim()) {
                    alert('El nombre de la marca no puede estar vacío');
                    return;
                }
                onSave(marcaNombre);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-30 backdrop-blur-sm flex items-end z-50">
                    <div className="bg-white w-full rounded-t-3xl p-6 animate-slideUp shadow-soft-md">
                        <h2 className="text-2xl font-black mb-5 text-gray-800">✨ Crear Nueva Marca</h2>

                        <div className="mb-6">
                            <input
                                type="text"
                                placeholder="Nombre de la marca (ej: samsung, lg, etc)"
                                value={marcaNombre}
                                onChange={(e) => setMarcaNombre(e.target.value)}
                                className="w-full p-3.5 border-2 border-gray-300 rounded-lg-soft focus:outline-none focus:border-orange-400 font-semibold"
                                autoFocus
                                onKeyPress={(e) => e.key === 'Enter' && handleSave()}
                            />
                            <p className="text-xs text-gray-500 mt-2">💡 Se guardará automáticamente en MAYÚSCULAS</p>
                        </div>

                        <div className="flex gap-3">
                            <button
                                onClick={handleSave}
                                className="flex-1 bg-gradient-to-r from-green-400 to-emerald-500 hover:from-green-500 hover:to-emerald-600 text-white font-bold py-3 rounded-lg-soft transition shadow-soft-md"
                            >
                                ✅ Crear Marca
                            </button>
                            <button
                                onClick={onClose}
                                className="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 rounded-lg-soft transition shadow-soft-md"
                            >
                                Cancelar
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
